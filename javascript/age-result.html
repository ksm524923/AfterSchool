<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조건문</title>
</head>
<body>
    <script>
        var userNumber=prompt("숫자를 입력하세요")
        if(userNumber!==null){
        if(userNumber%3==0){
            document.write("3의배수이다")
        }
               else
            document.write("3의배수 아닙니다") 
        }       
        else document.write("입력을 취소합니다")
    </script>
</body>
</html>
