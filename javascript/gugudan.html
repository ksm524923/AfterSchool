<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구구단-for문</title>
    <link rel="stylesheet" href="gugudan.css">
</head>
<body>
    <h1>구구단</h1>
    <script>
        var i,j;
        for(i=1;i<=9;i++){
            //document.write("<h3>"+i+"단</h3>");
            for(j=1;j<=9;j++){
                document.write(j+"X"+i+"="+i*j+"\t");
            }
        }
    </script>
</body>
</html>
