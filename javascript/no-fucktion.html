<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let adderN = (x, y) => {
        alert("결괴 값 = " + (x + y));
      };
      while (1) {
        let a = +prompt("정수를 입력하세요.");
        let b = +prompt("정수를 입력하세요.");
        adderN(a, b);
        if (a == 0 || b == 0) {
          alert("프로그램 종료");
          break;
        }
      }
    </script>
  </body>
</html>
