<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Creative Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 네비게이션 -->
  <header>
    <div class="container nav">
      <h1 class="logo">CREATIVE</h1>
      <nav>
        <a href="#">소개</a>
        <a href="#">기능</a>
        <a href="#">참여하기</a>
        <a href="#">문의</a>
      </nav>
    </div>
  </header>

  <!-- 메인 -->
  <section class="hero">
    <div class="container">
      <h2>아이디어를 현실로</h2>
      <p>당신의 창의적인 프로젝트를 세상에 보여주세요</p>
      <button>지금 시작하기</button>
    </div>
  </section>

  <!-- 소개 -->
  <section class="about">
    <div class="container">
      <h2>서비스 소개</h2>
      <p>이 플랫폼은 창작자들을 위한 공간으로, 누구나 자신의 아이디어를 공유하고 발전시킬 수 있습니다.</p>
    </div>
  </section>

  <!-- 기능 -->
  <section class="features">
    <div class="container grid">
      <div class="card">
        <h3>아이디어 공유</h3>
        <p>자유롭게 프로젝트를 등록하고 의견을 받아보세요.</p>
      </div>
      <div class="card">
        <h3>협업 기능</h3>
        <p>다른 사용자들과 함께 프로젝트를 발전시킬 수 있습니다.</p>
      </div>
      <div class="card">
        <h3>피드백 시스템</h3>
        <p>다양한 피드백을 통해 아이디어를 개선하세요.</p>
      </div>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta">
    <div class="container">
      <h2>지금 바로 참여하세요</h2>
      <button>회원가입</button>
    </div>
  </section>

  <!-- 푸터 -->
  <footer>
    <p>© 2026 Creative Platform. All rights reserved.</p>
  </footer>

</body>
</html>
