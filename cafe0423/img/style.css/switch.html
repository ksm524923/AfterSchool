<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세션 선택-switch문</title>
    <link rel="stylesheet" href="switch.css">
</head>
<body>
    <script>
        var session=prompt("날짜를 입력하세요.");
        switch(session){
            case "12":
            case "1":
            case "2":alert("봄입니다.");break;
            case "3":
            case "4":
            case "5":alert("여름입니다.");break;
            case "6":
            case "7":
            case "8":alert("가을입니다.");break;
            case "9":
            case "10":
            case "11":alert("겨울입니다");break;
        }
    </script>
</body>
</html>
